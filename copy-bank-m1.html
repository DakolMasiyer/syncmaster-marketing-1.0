Permission to pair your composition with visual content.

→ A supervisor has to negotiate with two parties

'THREAD-04': { body: `1/ The music supervisor didn't reject your track because it wasn't good.

They rejected it because it wasn't clear.

Here's what "rights clearance" actually means — and why it's the most important thing you can fix this week. 🧵

2/ A "cleared" track means:
→ The composition is original (no uncleared samples)
→ The rights owner(s) can be identified immediately
→ A licence can be granted without involving a third party
→ The master is owned by someone who can sign off today

If any of those aren't true, the track isn't cleared. Full stop.

3/ The sample problem.

If your track contains a sample — even a small one, even flipped — and it's not cleared, the track is legally unusable for sync.

A production company cannot broadcast a track with uncleared samples. The liability is theirs.

They will skip your track, no matter how good it is.

4/ The split rights problem.

Your label owns the master. You own publishing.

Now a supervisor needs two clearances. Two sets of negotiations. Two timelines.

Most supervisors move on. They find a one-stop track instead.

5/ The registration problem.

You can't collect performance royalties from a placement if you're not registered with a PRO (SAMRO, COSON, SOCAN, PRS, ASCAP, etc.).

And if your tracks don't have ISRCs, you can't be found in their databases.

Every placement has royalties attached. But you have to be registered to receive them.

6/ The fix for most of this:
→ Stop using uncleared samples (or clear the ones you have)
→ Retain your master rights before signing deals
→ Register every track with a PRO
→ Get ISRCs from a distributor or your national music body

This is months of work. Start now.

7/ SyncMaster verifies all of this before we pitch a single track.

Because our credibility with supervisors depends on it.

'STANDALONE-IG-02': { body: `Stems close deals.

Music supervisors will often shortlist your track — then ask for stems before confirming the placement.

Stems = individual instrument tracks from your session exported separately.

→ To fit your music to picture (trimming, looping, adjusting levels)
→ To isolate or remove elements that clash with dialogue
→ To create custom edits for different cut lengths

'IG-EDU-07': { body: `It's not your sound.

Here are the actual reasons African composers get passed over in sync licensing — none of them have anything to do with talent. ↓

REASON 1: UNCLEARED SAMPLES
Even a small sample that isn't cleared makes the track legally untouchable.
Productions carry full liability for anything they broadcast.
They won't risk it, no matter how good the track is.

REASON 2: SPLIT RIGHTS
Label owns your master. You own publishing.
Two separate negotiations for one placement.
Most supervisors have 20 other options. They move on.

REASON 3: NO METADATA
No BPM tag. No ISRC. No mood categorisation.
Your track doesn't show up in a search.
You're invisible even when you're technically "in the library."

REASON 4: WRONG FILE FORMAT
MP3 files. SoundCloud links. Google Drive folders.
Supervisors need lossless files, properly named, ready immediately.

REASON 5: SLOW RESPONSE
A brief is live for 24–48 hours.
If you respond in 3 days, the slot is filled.
This is not a relationship business at that stage. It's a logistics business.

→ Why none of this is about your sound

→ Rights splits — how to protect yourself before signing anything
→ The metadata checklist for every file in your catalogue

'IG-EDU-08': { body: `Your track has no ISRC code?

That's the first thing we fix at SyncMaster. Here's exactly why it matters more than almost anything else in your catalogue. ↓

ISRC = International Standard Recording Code

A unique identifier assigned to each individual recording.
Think of it as a barcode for your music.

Why it matters for sync specifically:

→ It identifies your recording in global licensing databases
→ It links your track to royalty collection societies worldwide (SAMRO, COSON, SOCAN, PRS, ASCAP, and more)
→ Without it, performance royalties from any placement can't reach you
→ Without it, your track can't be properly catalogued in sync libraries

A placement without an ISRC = money you'll never collect.

HOW TO GET ONE:

Through your national music body:
→ RISA (South Africa)
→ COSON (Nigeria)
→ MCSK (Kenya)
→ CAPASSO (South Africa)
→ GHAMRO (Ghana)

Through your distributor:
→ DistroKid, TuneCore, CD Baby all assign ISRCs automatically

Direct registration: IFPI.org

Cost: Free or minimal.
Time: 24–72 hours in most cases.

Every track in the SyncMaster catalogue has an ISRC.
Every composer we onboard gets this sorted in the first call.

Questions? DM us. Or apply: link in bio.

#ISRC #MusicRights #SyncReady #AfricanComposers #SyncMaster`, cta: 'Do your tracks have ISRCs? DM us if you need help.' },

let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } }

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ── FILTERS ────────────────────────────────────────────────────────
let activePlatform = 'all';
let activePillar   = 'all';

function applyFilters() {
  let count = 0;
  document.querySelectorAll('.cb-card').forEach(card => {
    const plat   = card.dataset.platform;
    const pillar = card.dataset.pillar;
    const show   = (activePlatform === 'all' || plat   === activePlatform)
                && (activePillar   === 'all' || pillar === activePillar);
    card.classList.toggle('hidden', !show);
    if (show) count++;
  });
  document.getElementById('filter-count').textContent = count + ' post' + (count !== 1 ? 's' : '');
  document.getElementById('cb-empty').classList.toggle('hidden', count > 0);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.dataset.group;
    const val   = btn.dataset.filter;
    if (group === 'platform') {
      activePlatform = val;
      document.querySelectorAll('.filter-btn[data-group="platform"]').forEach(b => b.classList.remove('active'));
    } else {
      activePillar = activePillar === val ? 'all' : val;
      document.querySelectorAll('.filter-btn[data-group="pillar"]').forEach(b => b.classList.remove('active'));
      if (activePillar === 'all') {
        document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
      }
    }
    btn.classList.toggle('active', group === 'platform' ? val === activePlatform : activePillar === val);
    if (group === 'platform') btn.classList.add('active');
    applyFilters();
  });
});

// ── PROGRESS ──────────────────────────────────────────────────────
function updateProgress() {
  const total  = POSTS.length;
  const done   = POSTS.filter(p => state[p.id] === 'done').length;
  const pct    = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-done').textContent = done;
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ── RENDER ────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '';
  const [, m, day] = d.split('-');
  const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[+m] + ' ' + (+day);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const list = document.getElementById('cb-list');

POSTS.forEach(post => {
  const copy   = COPY[post.id];
  if (!copy) return;
  const status = state[post.id] || 'todo';
  const pBadge = PLATFORM_BADGE[post.platform] || 'badge-blog';
  const pClass = PILLAR_CLASS[post.pillar]      || 'pillar-education';
  const statusLabel = status === 'todo' ? 'To Do' : status === 'inprogress' ? 'In Progress' : 'Done';

  const card = document.createElement('div');
  card.className = 'cb-card';
  card.dataset.postId  = post.id;
  card.dataset.status  = status;
  card.dataset.platform = post.platform;
  card.dataset.pillar   = post.pillar;

  card.innerHTML =
    `<div class="cb-card-hdr">` +
      `<div class="cb-card-badges">` +
        `<span class="post-id">${esc(post.id)}</span>` +
        `<span class="platform-badge ${pBadge}">${esc(post.platform)}</span>` +
        `<span class="pillar-chip ${pClass}">${esc(post.pillar)}</span>` +
        `<span class="type-tag">${esc(post.type)}</span>` +
      `</div>` +
      `<span class="cb-card-date">${fmtDate(post.date)}</span>` +
    `</div>` +
    `<div class="cb-topic">${esc(post.topic)}</div>` +
    `<div class="cb-card-copy">${esc(copy.body)}</div>` +
    (copy.cta ? `<div class="cb-card-cta">↳ ${esc(copy.cta)}</div>` : '') +
    `<div class="cb-card-ftr">` +
      `<div class="cb-status-row">` +
        `<div class="cb-status-dot" data-status="${status}"></div>` +
        `<select class="cb-status-select" data-status="${status}" data-post-id="${esc(post.id)}">` +
          `<option value="todo"${status==='todo'?' selected':''}>○ To Do</option>` +
          `<option value="inprogress"${status==='inprogress'?' selected':''}>◐ In Progress</option>` +
          `<option value="done"${status==='done'?' selected':''}>● Done</option>` +
        `</select>` +
      `</div>` +
      `<button class="cb-copy-btn" data-post-id="${esc(post.id)}" type="button">Copy</button>` +
    `</div>`;

  list.appendChild(card);
});

// ── STATUS CHANGE ────────────────────────────────────────────────
list.addEventListener('change', e => {
  const sel = e.target.closest('.cb-status-select');
  if (!sel) return;
  const id  = sel.dataset.postId;
  const val = sel.value;
  state[id] = val;
  saveState();
  sel.dataset.status = val;
  const card = sel.closest('.cb-card');
  card.dataset.status = val;
  const dot = card.querySelector('.cb-status-dot');
  if (dot) dot.dataset.status = val;
  updateProgress();
});

// ── COPY BUTTON ──────────────────────────────────────────────────
list.addEventListener('click', e => {
  const btn = e.target.closest('.cb-copy-btn');
  if (!btn) return;
  const c = COPY[btn.dataset.postId];
  if (!c) return;
  const text = c.cta ? `${c.body}\n\n${c.cta}` : c.body;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
});

updateProgress();
applyFilters();
</script>

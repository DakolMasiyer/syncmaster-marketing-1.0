<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--background); color: var(--foreground); }
  body { padding: 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:16px; }
  .col { display:flex; flex-direction:column; gap:6px; }
  .role { font-family: var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color: var(--muted-foreground); }
  .mono-meta { font-family: var(--font-mono); font-size:11px; color: var(--muted-foreground); }
</style>
</head><body>

<div class="role" style="margin-bottom:14px">LOGO ON LIGHT — WORDMARK + ICON</div>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px;">
  <div style="background:#ffffff; border:1px solid var(--border); border-radius:12px; padding:24px; display:flex; align-items:center; justify-content:center; min-height:120px;">
    <img src="../assets/logos/Primary Horizontal Logo.svg" style="max-width:240px; max-height:60px;">
  </div>
  <!-- Right tile: icon mark only on white background. -->
  <div style="background:#ffffff; border:1px solid var(--border); border-radius:12px; padding:24px; display:flex; align-items:center; justify-content:center; min-height:120px;">
    <img src="../assets/logos/Icon . Mark only.svg" style="width:80px; height:80px;">
  </div>
</div>
</body></html>

<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--background); color: var(--foreground); }
  body { padding: 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:16px; }
  .col { display:flex; flex-direction:column; gap:6px; }
  .role { font-family: var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color: var(--muted-foreground); }
  .mono-meta { font-family: var(--font-mono); font-size:11px; color: var(--muted-foreground); }
</style>
</head><body>

<div class="role" style="margin-bottom:14px">BRIEF CARD — DASHBOARD PATTERN · BORDER · ROUNDED 24</div>
<a style="display:flex; flex-direction:column; gap:14px; padding:24px; border-radius:24px; background:var(--card); border:1px solid var(--border); width:340px; text-decoration:none; color:inherit; box-shadow:0 1px 3px rgba(0,0,0,.1);">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:9999px; background:oklch(0.88 0.18 120); color:#000; font-size:10px; font-weight:900; letter-spacing:0.2em;">ACTIVE</span>
    <span style="font-size:11px; font-weight:700; color:var(--muted-foreground); background:rgba(255,255,255,.04); padding:2px 8px; border-radius:6px; border:1px solid var(--border);">Jun 14, 2026</span>
  </div>
  <h3 style="margin:0; font-size:18px;">Lagos crime thriller — main title cue</h3>
  <div style="display:flex; align-items:center; gap:8px;">
    <div style="width:24px; height:24px; border-radius:9999px; background:linear-gradient(135deg, rgba(75,75,192,.2), rgba(168,85,247,.2)); border:1px solid rgba(75,75,192,.1); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;">A</div>
    <span style="font-size:11px; font-weight:700; color:var(--muted-foreground);">Aisha Olatunde <span style="font-weight:400; opacity:.6">at</span> Black River Pictures</span>
  </div>
  <div style="display:flex; gap:6px; flex-wrap:wrap;">
    <span style="display:inline-flex; padding:4px 10px; border-radius:6px; background:rgba(255,255,255,.04); border:1px solid var(--border); color:#4b4bc0; font-size:11px; font-weight:700;">Afrobeats</span><span style="display:inline-flex; padding:4px 10px; border-radius:6px; background:rgba(255,255,255,.04); border:1px solid var(--border); color:#4b4bc0; font-size:11px; font-weight:700;">Cinematic</span><span style="display:inline-flex; padding:4px 10px; border-radius:6px; background:rgba(255,255,255,.04); border:1px solid var(--border); color:#4b4bc0; font-size:11px; font-weight:700;">Tense</span>
  </div>
  <div style="margin-top:8px; padding-top:18px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
    <div>
      <div class="label">BUDGET RANGE</div>
      <div style="font-size:14px; font-weight:900; letter-spacing:-0.04em; margin-top:2px;">$15,000 – $25,000</div>
    </div>
    <div style="width:36px; height:36px; border-radius:9999px; background:rgba(75,75,192,.1); display:flex; align-items:center; justify-content:center; color:#4b4bc0;">→</div>
  </div>
</a>
</body></html>

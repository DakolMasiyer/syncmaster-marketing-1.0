<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SyncMaster — African Composers. Global Briefs.</title>
<link rel="icon" href="../../assets/logos/syncmaster-icon.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body, #root { margin: 0; min-height: 100%; }
  body { background: #fff; color: #111; font-family: var(--font-sans); }
  /* Light-mode override: marketing is always light */
  html { color-scheme: light; }
  body { --background: #fff; --foreground: #111; --card: #fff; --muted: #f5f5f5; --muted-foreground: #666; --border: #e5e5e5; --input: #e5e5e5; }
</style>
</head>
<body data-screen-label="Marketing">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<script type="text/babel" src="./Components.jsx"></script>
<script type="text/babel" src="./Screens.jsx"></script>

<script type="text/babel">
function App() {
  const [page, setPage] = React.useState('home');
  React.useEffect(() => {
    window.scrollTo(0, 0);
    window.lucide && window.lucide.createIcons();
  }, [page]);

  // Map nav target → page slug
  const goto = (target) => {
    if (target === 'composers') setPage('composers');
    else if (target === 'supervisors') setPage('supervisors');
    else setPage('home');
  };

  const body = page === 'composers' ? <ComposersPage />
             : page === 'supervisors' ? <SupervisorsPage />
             : <Landing onNavigate={goto} />;

  const activeNav = page === 'composers' ? 'composers'
                  : page === 'supervisors' ? 'supervisors' : 'home';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh', background: '#fff' }}>
      <MarketingNav active={activeNav} onNavigate={goto} />
      <main style={{ flex: 1 }} data-screen-label={'Marketing / ' + page}>{body}</main>
      <Footer />
    </div>
  );
}

const wait = setInterval(() => {
  if (window.Landing && window.MarketingNav) {
    clearInterval(wait);
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  }
}, 50);
</script>
</body>
</html>

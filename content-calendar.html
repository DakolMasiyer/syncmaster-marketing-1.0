<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>SyncMaster Content OS</title>
<style>body{font-family:Arial;background:#0f1115;color:#eee;margin:0}header{padding:16px;background:#171b22;position:sticky;top:0}main{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:12px}.card{background:#171b22;padding:12px;border-radius:8px}.row{display:flex;gap:8px;flex-wrap:wrap}input,select,textarea,button{background:#0f1115;color:#eee;border:1px solid #333;border-radius:6px;padding:8px}textarea{min-height:90px;width:100%}.list{max-height:260px;overflow:auto}.item{padding:8px;border:1px solid #2a2f39;border-radius:6px;margin-bottom:8px}.calendar{grid-column:1/-1}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{background:#0f1115;padding:8px;border-radius:6px;min-height:120px}.tag{padding:2px 6px;border-radius:999px;background:#233}.muted{color:#aaa;font-size:12px}.err{color:#ff8f8f}.modal{position:fixed;inset:0;background:#0009;display:none;place-items:center}.modal .card{width:min(700px,90vw)}</style></head>
<body><header><h2>SyncMaster Content OS — Content Calendar System</h2></header><main>
<section class='card'><h3>1) Content Bank</h3><input id='ideaId' type='hidden'><div class='row'><input id='ideaTitle' placeholder='Title'><input id='ideaTags' placeholder='Tags comma-separated'><select id='ideaFunnel'><option>awareness</option><option>engagement</option><option>conversion</option><option>retention</option></select></div><textarea id='ideaDesc' placeholder='Description'></textarea><div class='row'><input id='ideaPlatforms' placeholder='Platforms e.g. linkedin,instagram'><select id='ideaStatus'><option>idea</option><option>selected</option><option>archived</option></select><button id='addIdea'>Add Idea</button></div><div id='ideaErr' class='err'></div><div class='row'><input id='ideaSearch' placeholder='Search'><input id='ideaFilterTag' placeholder='Filter tag'></div><div id='ideas' class='list'></div></section>
<section class='card'><h3>2) Source Content</h3><input id='sourceId' type='hidden'><input id='sourceTitle' placeholder='Title'><div class='row'><select id='sourceFormat'><option>blog</option><option>podcast_script</option><option>video_script</option></select><select id='sourceStatus'><option>draft</option><option>in_review</option><option>published</option></select><select id='sourceIdea'></select></div><textarea id='sourceBody' placeholder='Markdown body'></textarea><div class='card'><b>Preview</b><div id='sourcePreview' class='muted'></div></div><div class='row'><input id='sourceHook' placeholder='Hook'><input id='sourceKeyPoints' placeholder='Key points comma-separated'><button id='addSource'>Save Source</button></div><div id='sourceErr' class='err'></div><div class='row'><button id='genRepurpose'>Generate repurposed content</button></div><div id='sources' class='list'></div></section>
<section class='card'><h3>3) Repurposing Engine</h3><div id='repurposed' class='list'></div></section>
<section class='card'><h3>4) Standalone Content</h3><div class='row'><input id='standTitle' placeholder='Title'><select id='standPlatform'><option>linkedin</option><option>instagram</option><option>tiktok</option><option>youtube</option><option>newsletter</option></select><input id='standDate' type='date'></div><textarea id='standContent' placeholder='Quick content'></textarea><div class='row'><input id='standTags' placeholder='tags'><button id='addStandalone'>Insert to Calendar</button></div></section>
<section class='card calendar'><h3>5) Calendar</h3><div class='row'><input id='weekStart' type='date'><button id='autoScheduleBtn'>Auto Schedule Repurposed</button><button id='monthView'>Toggle Month View</button></div><div id='calendar'></div></section>
</main><div id='calEdit' class='modal'><div class='card'><h3>Edit calendar item</h3><input id='calId' type='hidden'><div class='row'><input id='calDate' type='date'><select id='calPlatform'><option>linkedin</option><option>instagram</option><option>tiktok</option><option>youtube</option><option>newsletter</option></select></div><textarea id='calContent' placeholder='content'></textarea><input id='calCaption' placeholder='caption'><input id='calTags' placeholder='tags'><div class='row'><button id='calSave'>Save</button><button id='calCancel'>Cancel</button></div></div></div>
<script type='module' src='./app/content-os.js'></script></body></html>

<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--background); color: var(--foreground); }
  body { padding: 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:16px; }
  .col { display:flex; flex-direction:column; gap:6px; }
  .role { font-family: var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color: var(--muted-foreground); }
  .mono-meta { font-family: var(--font-mono); font-size:11px; color: var(--muted-foreground); }
</style>
</head><body>

<div class="role" style="margin-bottom:14px">BANNER — LEFT-BORDER ACCENT · INLINE CONTEXT MESSAGE</div>
<div style="display:flex; flex-direction:column; gap:10px;">
  <div style="padding:14px 16px; border-radius:12px; background:rgba(75,75,192,.08); border:1px solid var(--border); border-left:4px solid var(--primary); font-size:13px;">
    <span class="label-strong">REVIEW QUEUE</span> &nbsp; 3 briefs awaiting review — open to activate
  </div>
  <div style="padding:14px 16px; border-radius:12px; background:rgba(34,197,94,.08); border:1px solid rgba(34,197,94,.2); border-left:4px solid #22c55e; color:#22c55e; font-weight:500; font-size:13px;">
    <span style="font-weight:700; letter-spacing:0.1em; text-transform:uppercase; font-size:11px;">Placement confirmed</span> · Submitted to Black River Pictures
  </div>
  <div style="padding:14px 16px; border-radius:12px; background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); border-left:4px solid #ef4444; color:#ef4444; font-weight:500; font-size:13px;">
    <span style="font-weight:700; letter-spacing:0.1em; text-transform:uppercase; font-size:11px;">Upload failed</span> · File exceeds 200MB
  </div>
</div>
</body></html>

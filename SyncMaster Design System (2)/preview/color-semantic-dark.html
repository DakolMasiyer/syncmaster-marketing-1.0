<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--background); color: var(--foreground); }
  body { padding: 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 16px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .swatch { width: 100%; height: 64px; border-radius: var(--radius-base); border: 1px solid var(--border); }
  .swatch-lg { height: 96px; }
  .meta { display:flex; justify-content:space-between; align-items:baseline; gap: 8px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); letter-spacing: 0.04em; }
  .name { font-size: 13px; font-weight: 700; letter-spacing: -0.04em; }
  .role { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-foreground); }
  .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
</style>
</head>
<body>

<div class="row" style="margin-bottom:8px"><div class="role">DARK MODE — SEMANTIC TOKENS IN CONTEXT</div></div>
<div style="background:#0f0f1a; padding:20px; border-radius:8px; border:1px solid rgba(255,255,255,0.08); display:grid; gap:12px;">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
    <div style="background:#16162a; border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:14px;">
      <div style="color:#f9f9f9; font-weight:900; letter-spacing:-0.04em; font-size:14px;">Card surface</div>
      <div style="color:#94a3b8; font-size:11px; margin-top:4px;">card on background</div>
    </div>
    <div style="background:#282828; border-radius:8px; padding:14px;">
      <div style="color:#f9f9f9; font-weight:900; letter-spacing:-0.04em; font-size:14px;">Muted</div>
      <div style="color:#94a3b8; font-size:11px; margin-top:4px;">tertiary surfaces</div>
    </div>
  </div>
  <div style="display:flex; gap:8px; align-items:center;">
    <span style="background:#4b4bc0; color:#fff; padding:3px 10px; border-radius:9999px; font-size:11px; font-weight:700;">Primary</span>
    <span style="background:oklch(0.88 0.18 120); color:#000; padding:3px 10px; border-radius:9999px; font-size:11px; font-weight:700; box-shadow:0 0 14px rgba(217,249,157,0.3);">Acid · Active</span>
    <span style="border:1px solid rgba(255,255,255,.16); color:#94a3b8; padding:3px 10px; border-radius:9999px; font-size:11px; font-weight:600;">Outline</span>
  </div>
</div>
</body></html>

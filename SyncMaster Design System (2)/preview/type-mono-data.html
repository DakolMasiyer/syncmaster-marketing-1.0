<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--background); color: var(--foreground); }
  body { padding: 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:16px; }
  .col { display:flex; flex-direction:column; gap:6px; }
  .role { font-family: var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color: var(--muted-foreground); }
  .mono-meta { font-family: var(--font-mono); font-size:11px; color: var(--muted-foreground); }
</style>
</head><body>

<div class="role" style="margin-bottom:14px">MONO DATA — TABULAR NUMS · MONEY · BPM · DURATIONS</div>
<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:14px; font-family: var(--font-mono);">
  <div><div class="label">BUDGET</div><div class="mono" style="font-size:22px; font-weight:600; margin-top:4px;">$15,000 – $25,000</div></div>
  <div><div class="label">BPM</div><div class="mono" style="font-size:22px; font-weight:600; margin-top:4px;">94</div></div>
  <div><div class="label">DURATION</div><div class="mono" style="font-size:22px; font-weight:600; margin-top:4px;">3:24</div></div>
</div>
</body></html>

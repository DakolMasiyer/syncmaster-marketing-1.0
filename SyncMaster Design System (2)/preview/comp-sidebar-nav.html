<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--background); color: var(--foreground); }
  body { padding: 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:16px; }
  .col { display:flex; flex-direction:column; gap:6px; }
  .role { font-family: var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color: var(--muted-foreground); }
  .mono-meta { font-family: var(--font-mono); font-size:11px; color: var(--muted-foreground); }
</style>
</head><body>

<div class="role" style="margin-bottom:14px">SIDEBAR NAV ITEM — ACTIVE · HOVER · DEFAULT</div>
<div style="display:flex; flex-direction:column; gap:6px; background:#4b4bc0; padding:14px; border-radius:12px; width:240px;">
  <div style="padding:10px 16px; border-radius:12px; background:#fff; color:#4b4bc0; font-weight:900; letter-spacing:-0.04em; font-size:13px; display:flex; align-items:center; gap:10px; box-shadow:0 4px 12px rgba(0,0,0,.2); transform:scale(1.02);">
    <span style="width:14px; height:14px; background:currentColor; mask:radial-gradient(circle, transparent 30%, currentColor 30%); display:inline-block; border-radius:3px;"></span>
    Dashboard
  </div>
  <div style="padding:10px 16px; border-radius:12px; background:rgba(255,255,255,.05); color:#fff; font-weight:900; letter-spacing:-0.04em; font-size:13px; display:flex; align-items:center; gap:10px;">
    <span style="width:14px; height:14px; background:currentColor; opacity:.9; border-radius:3px;"></span>
    Catalog
  </div>
  <div style="padding:10px 16px; border-radius:12px; color:rgba(255,255,255,.7); font-weight:900; letter-spacing:-0.04em; font-size:13px; display:flex; align-items:center; gap:10px;">
    <span style="width:14px; height:14px; background:currentColor; border-radius:3px;"></span>
    Briefs
  </div>
  <div style="padding:10px 16px; border-radius:12px; color:rgba(255,255,255,.7); font-weight:900; letter-spacing:-0.04em; font-size:13px; display:flex; align-items:center; gap:10px;">
    <span style="width:14px; height:14px; background:currentColor; border-radius:3px;"></span>
    Placements
  </div>
</div>
</body></html>

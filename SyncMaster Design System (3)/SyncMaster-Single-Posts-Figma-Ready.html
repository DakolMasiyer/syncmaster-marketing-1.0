<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SyncMaster — Single Posts — Figma Ready</title>
    <style>
        :root {
            --sm-dark: #0A0A20;
            --sm-purple: #5252E0;
            --sm-lime: #C9E834;
            --sm-warm-white: #f4f4f0;
            --sm-text-white: #f9f9f9;
            --font-display: "DM Sans", sans-serif;
            --font-chrome: "Geist Mono", monospace;
        }

        /* Fixed Canvas Constraint */
        html, body {
            width: 1080px;
            height: 1350px;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--sm-dark);
            color: var(--sm-text-white);
            font-family: var(--font-display);
        }

        #canvas {
            position: relative;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        /* Semantic Layer Styling (Simplified for Figma Import) */
        #background { position: absolute; inset: 0; background-color: var(--sm-dark); z-index: 1; }
        #headline { position: absolute; top: 300px; left: 64px; font-weight: 800; font-size: 100px; z-index: 2; }
        #eyebrow { position: absolute; top: 100px; left: 64px; font-family: var(--font-chrome); z-index: 2; }
        #subtext { position: absolute; top: 600px; left: 64px; width: 800px; z-index: 2; }
        #cta-pill { position: absolute; top: 1000px; left: 64px; background: var(--sm-purple); padding: 20px 40px; border-radius: 99px; z-index: 3; }
        #footer { position: absolute; bottom: 64px; left: 64px; right: 64px; z-index: 3; }
    </style>
</head>
<body>
    <div id="canvas">
        <div id="background"></div>
        <div id="eyebrow">SYNCMASTER — SINGLE POST</div>
        <div id="headline">Content to be populated</div>
        <div id="subtext">Supporting text here</div>
        <div id="cta-pill">Apply Now</div>
        <div id="footer">syncmaster.live</div>
    </div>
</body>
</html>

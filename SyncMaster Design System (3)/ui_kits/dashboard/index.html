<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>SyncMaster — Dashboard</title>
<link rel="icon" href="../../assets/logos/syncmaster-icon.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body, #root { height: 100%; margin: 0; }
  body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
  }
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 4px; }
</style>
</head>
<body data-screen-label="Dashboard">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<script type="text/babel" src="./Sidebar.jsx"></script>
<script type="text/babel" src="./Components.jsx"></script>
<script type="text/babel" src="./Screens.jsx"></script>

<script type="text/babel">
function App() {
  const [screen, setScreen] = React.useState('Dashboard');
  const [track, setTrack] = React.useState(null);
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); }, [screen]);

  const screenMap = {
    'Dashboard':   <DashboardHome />,
    'Briefs':      <BriefsList />,
    'BriefDetail': <BriefDetail />,
    'Catalog':     <CatalogPage onPlay={(t)=>setTrack({title:t.title, artist:t.artist, genre:t.genre})} />,
  };

  // Click-thru: Briefs → BriefDetail when row clicked. Simple approach — wire on heading.
  const crumbMap = {
    Dashboard: 'Dashboard',
    Briefs: 'Briefs',
    BriefDetail: 'Briefs / Lagos crime thriller',
    Catalog: 'Catalog',
    Placements: 'Placements',
    'Pages (EPK)': 'Pages',
    Campaigns: 'Campaigns',
    'Radio Directory': 'Radio Directory',
    Composers: 'Composers',
    Producers: 'Producers',
  };

  // Default any nav target that isn't implemented to the dashboard home.
  const body = screenMap[screen] || <DashboardHome />;

  return (
    <div style={{ minHeight: '100vh', background: 'var(--background)' }}>
      <Sidebar active={screen === 'BriefDetail' ? 'Briefs' : screen} onNavigate={setScreen} />
      <div style={{ marginLeft: 256, minWidth: 0, display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
        <Header crumb={crumbMap[screen] || screen} />
        <main style={{ flex: 1, padding: '16px 24px 96px' }} data-screen-label={screen}>
          {/* In-page jump: if on Briefs list, clicking the first row 'opens' detail. */}
          {screen === 'Briefs'
            ? <div onClick={(e) => {
                if (e.target.closest('a')) { setScreen('BriefDetail'); }
              }}><BriefsList /></div>
            : body}
        </main>
      </div>
      <MusicPlayer track={track} />
    </div>
  );
}

const wait = setInterval(() => {
  if (window.DashboardHome && window.Sidebar && window.Header) {
    clearInterval(wait);
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  }
}, 50);
</script>
</body>
</html>

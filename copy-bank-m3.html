THE UK MARKET

UK music supervisors are ahead on African music. They've placed it.

→ Afrobeats and Afropop for lifestyle, fashion, food content

→ Contemporary orchestral work from African composers for drama

Month 3 question: what separates a catalogue that gets briefs from one that doesn't? ↓

— — —

DEPTH OVER WIDTH

A supervisor doesn't need 400 tracks.
They need 40 tracks that are deeply documented, consistently available, instantly deliverable.

Depth means:
→ Every track has a complete metadata record
→ Every track has stems prepared and labelled
→ Every co-writer credit is documented and signed
→ Rights are confirmed on every piece before any brief arrives

Width means: you have a lot of stuff.
Supervisors can't use "a lot of stuff."

— — —

MOODBOARD YOUR CATALOGUE

Great catalogue managers don't think in track titles.
They think in placement types.

Build a mood index:
— Upbeat / celebratory (sports, celebration, product launch)
— Tension / build (thriller, drama, documentary)
— Intimate / emotive (healthcare, charity, human interest)
— Epic / cinematic (films, streaming originals, trailers)
— Background / atmospheric (hospitality, retail, ambient brand)

Every track should have a primary and secondary placement type.
Supervisors search this way. Speak their language.

— — —

VERSIONING IS A COMPETITIVE ADVANTAGE

One track. Multiple submissions.
Standard: full mix
Instrumental: vocals removed
60-second edit: advertising format
30-second edit: social media / shorter spots
Extended: episodic or documentary use

Most composers submit one version.
The composers getting repeat briefs submit five.

— — —

'IG-M3-EDU-03': { body: `We've handled 9 briefs in 90 days.

Here's what every music supervisor actually wanted — from their words, not ours. ↓

— — —

WHAT THEY SAY THEY WANT

"Rights-cleared tracks with stems."
"Quick turnaround."
"African sounds for diverse casting."
"Real African music, not fusion."

Every brief. Every time.

— — —

WHAT THEY ACTUALLY MEAN

"Rights-cleared" means one-stop.
One conversation. One deal. No separate master/sync clearance.
If you can't confirm one-stop, you're off the shortlist before the brief goes out.

"Quick turnaround" means 24–48 hours, not 72.
The 11-hour turnaround in Month 2 got us the next three briefs.
Supervisors remember speed.

"African sounds" means specific, not continental.
Afrobeats is not the same as Highlife.
Amapiano is not the same as South African jazz.
Supervisors doing their homework know the difference. Assume they do.

— — —

WHAT THEY NEVER SAY BUT ALWAYS NEED

Stems in the delivery.
Not "available on request." In the initial folder.

Complete metadata.
If your track arrives without BPM, key, and mood tags, it adds friction.
Friction means a different track gets selected.

A clear fee position.
"What's your rate?" answered before it's asked.
Supervisors who have to chase a fee quote move on.

— — —

WHAT THEY REMEMBER

Music quality gets you the shortlist.
Documentation quality gets you the placement.

Three months of briefs confirmed this:
No rejected submission was rejected because of music quality.
Every rejection was documentation, rights, or turnaround.

— — —

HOW TO SPEAK THEIR LANGUAGE

Submit — don't pitch.
One email: WAV master + stems + metadata card + rate card + rights confirmation.

Not five messages. Not "I'll send the stems tomorrow."

The supervisors who came back for Month 2 briefs came back because the first submission required zero follow-up.

#SyncMaster #MusicSupervisor #AfricanComposers #SyncLicensing`, cta: `The composers getting repeat briefs are the ones whose submissions require zero follow-up.` },

'IG-M3-EDU-04': { body: `Month 1 answer: "Sync can be significant secondary income."
Month 3 answer — after 3 confirmed placements and 90 days of data. ↓

— — —

WHAT THE NUMBERS SHOW

A single confirmed placement generates:
→ Upfront sync fee: $800–$3,000 for regional / short-term (typical entry range)
→ Master fee (if you control your master): adds 30–50% to the upfront total
→ Performance royalties: ongoing for 1–3 years per placement, through your PRO

Three placements in 90 days, conservatively:
Upfront income: $4,500–$7,400 across three deals
Performance royalties: accumulating for years from each placement date

Compare that to streaming:
1 million streams = roughly $3,000–$4,000 at standard rates.
Getting to 1 million streams for most independent composers: 6–18 months.

Sync wins on timeline — if you can get the placements.

— — —

WHAT MAKES IT VIABLE AS PRIMARY INCOME

Critical variables:
→ Catalogue size: 30–60 sync-ready tracks (not 300 rough tracks)
→ Placement rate: one per quarter is sustainable; one per month is scalable
→ PRO registration: every placement must be registered to collect performance income
→ Repeat brief flow: supervisors who return = predictable pipeline

— — —

THE HONEST LIMITS

Sync is not passive income.
Each placement requires documentation, brief response, negotiation, and delivery.

It's also not consistent month-to-month.
A quiet month with no briefs is followed by a month with four.

What sync offers that streaming doesn't:
— Significantly higher per-use income
— Performance royalty compounding over years
— Industry relationships that generate further work

What streaming offers that sync doesn't:
— Volume (thousands of micro-transactions vs. dozens of large ones)
— Speed (release today, earn this month)
— No gatekeeping (no vetting required)

— — —

THE HONEST ANSWER

Yes — with 3+ confirmed placements per year, PRO registration, and a documented catalogue of 40+ tracks, sync can be primary income.

No — if you haven't completed rights documentation, don't have stems, or haven't registered with a PRO.

The talent is there. The infrastructure has to catch up first.

'YT-M3-02': { body: `[MONTH 3 VIDEO — How to Build a Catalogue for International Sync Markets]

// ── STATE ──────────────────────────────────────────────────────────
let state = {};
try {
  state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
} catch(e) { state = {}; }

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── FILTERS ───────────────────────────────────────────────────────
let activePlatform = 'all';
let activePillar   = 'all';

function applyFilters() {
  let count = 0;
  document.querySelectorAll('.cb-card').forEach(card => {
    const platform = card.dataset.platform;
    const pillar   = card.dataset.pillar;
    const show = (activePlatform === 'all' || platform === activePlatform)
                && (activePillar   === 'all' || pillar === activePillar);
    card.classList.toggle('hidden', !show);
    if (show) count++;
  });
  document.getElementById('filter-count').textContent = count + ' post' + (count !== 1 ? 's' : '');
  document.getElementById('cb-empty').classList.toggle('hidden', count > 0);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.dataset.group;
    const val   = btn.dataset.filter;
    if (group === 'platform') {
      activePlatform = val;
      document.querySelectorAll('.filter-btn[data-group="platform"]').forEach(b => b.classList.remove('active'));
    } else {
      activePillar = activePillar === val ? 'all' : val;
      document.querySelectorAll('.filter-btn[data-group="pillar"]').forEach(b => b.classList.remove('active'));
      if (activePillar === 'all') {
        document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
      }
    }
    btn.classList.toggle('active', group === 'platform' ? val === activePlatform : activePillar === val);
    if (group === 'platform') btn.classList.add('active');
    applyFilters();
  });
});

// ── PROGRESS ──────────────────────────────────────────────────────
function updateProgress() {
  const total  = POSTS.length;
  const done   = POSTS.filter(p => state[p.id] === 'done').length;
  const pct    = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-done').textContent = done;
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ── RENDER ────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '';
  const [, m, day] = d.split('-');
  const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[+m] + ' ' + (+day);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const list = document.getElementById('cb-list');

POSTS.forEach(post => {
  const copy   = COPY[post.id];
  if (!copy) return;
  const status = state[post.id] || 'todo';
  const pBadge = PLATFORM_BADGE[post.platform] || 'badge-blog';
  const pClass = PILLAR_CLASS[post.pillar]      || 'pillar-education';

  const card = document.createElement('div');
  card.className = 'cb-card';
  card.dataset.postId   = post.id;
  card.dataset.status   = status;
  card.dataset.platform = post.platform;
  card.dataset.pillar   = post.pillar;

  card.innerHTML =
    `<div class="cb-card-hdr">` +
      `<div class="cb-card-badges">` +
        `<span class="post-id">${esc(post.id)}</span>` +
        `<span class="platform-badge ${pBadge}">${esc(post.platform)}</span>` +
        `<span class="pillar-chip ${pClass}">${esc(post.pillar)}</span>` +
        `<span class="type-tag">${esc(post.type)}</span>` +
      `</div>` +
      `<span class="cb-card-date">${fmtDate(post.date)}</span>` +
    `</div>` +
    `<div class="cb-topic">${esc(post.topic)}</div>` +
    `<div class="cb-card-copy">${esc(copy.body)}</div>` +
    (copy.cta ? `<div class="cb-card-cta">↳ ${esc(copy.cta)}</div>` : '') +
    `<div class="cb-card-ftr">` +
      `<div class="cb-status-row">` +
        `<div class="cb-status-dot" data-status="${status}"></div>` +
        `<select class="cb-status-select" data-status="${status}" data-post-id="${esc(post.id)}">` +
          `<option value="todo"${status==='todo'?' selected':''}>○ To Do</option>` +
          `<option value="inprogress"${status==='inprogress'?' selected':''}>◐ In Progress</option>` +
          `<option value="done"${status==='done'?' selected':''}>● Done</option>` +
        `</select>` +
      `</div>` +
      `<button class="cb-copy-btn" data-post-id="${esc(post.id)}" type="button">Copy</button>` +
    `</div>`;

  list.appendChild(card);
});

// ── STATUS CHANGE ────────────────────────────────────────────────
list.addEventListener('change', e => {
  const sel = e.target.closest('.cb-status-select');
  if (!sel) return;
  const id  = sel.dataset.postId;
  const val = sel.value;
  state[id] = val;
  saveState();
  sel.dataset.status = val;
  const card = sel.closest('.cb-card');
  card.dataset.status = val;
  const dot = card.querySelector('.cb-status-dot');
  if (dot) dot.dataset.status = val;
  updateProgress();
});

// ── COPY BUTTON ──────────────────────────────────────────────────
list.addEventListener('click', e => {
  const btn = e.target.closest('.cb-copy-btn');
  if (!btn) return;
  const c = COPY[btn.dataset.postId];
  if (!c) return;
  const text = c.cta ? `${c.body}\n\n${c.cta}` : c.body;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
});

updateProgress();
applyFilters();
</script>
</body>
</html>

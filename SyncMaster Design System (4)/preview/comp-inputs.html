<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--background); color: var(--foreground); }
  body { padding: 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:16px; }
  .col { display:flex; flex-direction:column; gap:6px; }
  .role { font-family: var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color: var(--muted-foreground); }
  .mono-meta { font-family: var(--font-mono); font-size:11px; color: var(--muted-foreground); }
</style>
</head><body>

<div class="role" style="margin-bottom:14px">INPUTS — H32 · ROUNDED 8 · 1PX BORDER · NO FILL</div>
<div style="display:flex; flex-direction:column; gap:10px;">
  <input type="text" placeholder="Search briefs" style="height:32px; padding:0 12px; border-radius:8px; background:transparent; border:1px solid var(--input); color:var(--foreground); font-family:var(--font-sans); font-size:14px; outline:none;">
  <input type="text" value="Afrobeat documentary score" style="height:32px; padding:0 12px; border-radius:8px; background:transparent; border:1px solid #4b4bc0; box-shadow:0 0 0 3px rgba(75,75,192,.3); color:var(--foreground); font-family:var(--font-sans); font-size:14px; outline:none;">
  <textarea placeholder="Describe the project..." style="padding:10px 12px; min-height:64px; border-radius:8px; background:transparent; border:1px solid var(--input); color:var(--foreground); font-family:var(--font-sans); font-size:14px; outline:none; resize:none;"></textarea>
</div>
</body></html>

<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--background); color: var(--foreground); }
  body { padding: 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:16px; }
  .col { display:flex; flex-direction:column; gap:6px; }
  .role { font-family: var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color: var(--muted-foreground); }
  .mono-meta { font-family: var(--font-mono); font-size:11px; color: var(--muted-foreground); }
</style>
</head><body>

<div class="role" style="margin-bottom:14px">ELEVATION — SPOTIFY-STYLE HEAVY · USED FOR MUSIC PLAYER + MODALS</div>
<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:18px; padding:24px 0 36px;">
  
    <div style="background:var(--card); border:1px solid var(--border); padding:14px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.30); font-family:var(--font-mono); font-size:11px;">
      <div style="color:var(--foreground); font-weight:600; margin-bottom:4px;">elev-1</div>
      <div style="color:var(--muted-foreground);">0 2px 8px rgba(0,0,0,.30)</div>
    </div>
    <div style="background:var(--card); border:1px solid var(--border); padding:14px; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.40); font-family:var(--font-mono); font-size:11px;">
      <div style="color:var(--foreground); font-weight:600; margin-bottom:4px;">elev-2</div>
      <div style="color:var(--muted-foreground);">0 8px 24px rgba(0,0,0,.40)</div>
    </div>
    <div style="background:var(--card); border:1px solid var(--border); padding:14px; border-radius:8px; box-shadow:0 12px 32px rgba(0,0,0,.60); font-family:var(--font-mono); font-size:11px;">
      <div style="color:var(--foreground); font-weight:600; margin-bottom:4px;">elev-3</div>
      <div style="color:var(--muted-foreground);">0 12px 32px rgba(0,0,0,.60)</div>
    </div>
</div>
</body></html>

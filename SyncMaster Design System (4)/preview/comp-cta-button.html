<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--background); color: var(--foreground); }
  body { padding: 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:16px; }
  .col { display:flex; flex-direction:column; gap:6px; }
  .role { font-family: var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color: var(--muted-foreground); }
  .mono-meta { font-family: var(--font-mono); font-size:11px; color: var(--muted-foreground); }
</style>
</head><body>

<div class="role" style="margin-bottom:14px">MARKETING CTA — H 64 · ROUNDED 16 · BLACK WEIGHT · GLOW</div>
<div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
  <a style="display:inline-flex; align-items:center; gap:8px; height:64px; padding:0 40px; border-radius:16px; background:#4b4bc0; color:#fff; font-weight:900; letter-spacing:-0.04em; font-size:18px; box-shadow:0 20px 40px -8px rgba(75,75,192,.4); text-decoration:none;">
    Get early access &rarr;
  </a>
  <a style="display:inline-flex; align-items:center; gap:8px; height:64px; padding:0 40px; border-radius:16px; background:transparent; color:var(--foreground); border:1px solid var(--input); font-weight:700; letter-spacing:-0.04em; font-size:18px; text-decoration:none;">
    I'm a composer
  </a>
</div>
</body></html>

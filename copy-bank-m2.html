Your first instinct is to say yes immediately.

Here's why that's the most expensive reaction in sync. ↓

When a placement offer lands, you have exactly one negotiation window. Before you sign, here's what experienced composers always check:

THE UPFRONT FEE
The first number is an opening bid — not the final price.
For branded content: fees typically run 20–40% higher than the first offer.
For streaming originals: push for the stated upper range.
Ask once. Clearly. Most supervisors expect it.

EXCLUSIVITY PERIOD
"Exclusive" locks your track for a window — no other placements during that time.
Six months: acceptable.
Two years: 3× the standard rate.
Negotiate the window before you negotiate the fee.

TERRITORY
UK-only and global use are fundamentally different deals.
A global campaign should cost 3–5× a regional one.
If the territory isn't defined in the offer: define it before you respond.

TERM LENGTH
One-off vs. rolling vs. in-perpetuity are three different contracts.
In-perpetuity means they can use your track forever.
That has a price significantly above the standard placement fee.

PERFORMANCE ROYALTIES
These are separate from your upfront fee.
Every time the content airs anywhere, royalties generate through your PRO.
Non-negotiable prerequisite: register before any placement is signed.
You cannot collect these retroactively.

The sync fee is the headline number.
Performance royalties are the compounding income beneath it.

Know both before you sign anything.

#SyncDeal #AfricanComposers #SyncLicensing #MusicBusiness #SyncMaster`, cta: 'Save this before your next deal conversation.' },

'LI-M2-01': { body: `Most African composers don't know what's negotiable in a sync deal.

I've had this exact conversation more times than I can count — so here it is in writing.

When a placement offer arrives, these five things are open for discussion:

UPFRONT FEE
The first offer is a negotiation opening, not a fixed price. For branded content especially, the budget almost always has room. Ask once, clearly. Most supervisors expect it.

EXCLUSIVITY PERIOD
Six months is reasonable. Two years or more should cost significantly more than a standard placement fee. Know the difference before you agree.

TERRITORY
Global use and regional use are different deals entirely. A track used globally is worth 3–5× a regional placement. If the territory isn't defined in the offer — define it before you respond.

TERM LENGTH
One-off, rolling, and in-perpetuity licences each carry a different price point. In-perpetuity means permanent use. That comes at a premium.

PERFORMANCE ROYALTIES
Separate from the upfront sync fee and often larger over time. Every airing generates royalties through your PRO. Register before any placement is signed — there is no retroactive collection.

What's typically not negotiable: delivery spec (broadcast-spec WAV), payment timeline (net 30 or 60), and credit attribution.

The goal is to be professional and informed — not adversarial. Most supervisors respect a composer who knows their worth.

If you have a deal on the table right now — DMs are open.

'IG-M2-EDU-03': { body: `Building a sync-ready catalogue isn't a weekend project.

But it's not complicated. It's sequential.

Here's the exact 5-step process we use at SyncMaster — from application to brief-ready. ↓

STEP 1: RIGHTS AUDIT (Weeks 1–2)
Before anything else: confirm what you own.
→ Is every composition 100% original? One uncleared sample stops the whole catalogue.
→ Who controls the master? You, a label, or joint ownership?
→ Is publishing registered with a PRO?
→ Any co-writers? Get the split documented in writing now.

STEP 2: FILE PREPARATION (Weeks 2–3)
→ Export full lossless WAV for every sync-ready track
→ File naming convention: Artist_Title_BPM_Key.wav
→ Export stems for every session: drums, bass, harmony, melody, atmosphere
→ Store stems in a cloud folder — accessible within 10 minutes

STEP 3: METADATA TAGGING (Week 3)
→ ISRC assigned to every recording
→ BPM, key, duration, genre embedded in file metadata
→ Mood tags: 3–5 per track in industry vocabulary
→ PRO affiliation and composer information embedded correctly

STEP 4: CATALOGUE INDEXING (Week 4)
→ Build a simple spreadsheet: title, BPM, key, mood, instrumentation, one-stop status
→ Separate into categories: brand/corporate, cinematic, documentary, emotional
→ Note which tracks have complete stems vs. partial stems

STEP 5: RESPONSE SYSTEM (Week 4)
→ Set brief notification to reach you within 1 hour of receipt
→ Test your delivery process: how fast can you send stems for 3 tracks?
→ Confirm rights for every catalogue track so you can respond in writing immediately

'IG-M2-EDU-04': { body: `"One-stop" is the most valuable status in sync licensing.

Most composers know the term. Almost none fully understand how to get there — especially once a label is involved.

Here's the clear explanation. ↓

ONE-STOP = you grant both licences from a single conversation.

LICENCE 1: The sync licence
→ Controls: use of your composition in visual media
→ Held by: the publisher — which is you, if you self-publish

LICENCE 2: The master licence
→ Controls: the specific recording
→ Held by: whoever owns the master — often a label, unless you recorded independently

If you control both → one-stop.
If a label controls the master → the supervisor has to negotiate with two parties, on two timelines, with two chances for the deal to fall apart.

Supervisors strongly prefer one-stop. When time is short (it always is), they go there first.

IF YOUR LABEL HOLDS YOUR MASTERS:
→ Check your deal: do you have sync approval rights? Even partial co-approval?
→ Negotiate co-approval on new work before signing
→ Build one-stop status into your next deal explicitly

IF YOU'RE FULLY INDEPENDENT:
→ Distribute through a platform that doesn't claim master rights (most don't — but check)
→ Self-publish: register directly with your PRO
→ Document every track's rights status from day one

The path to one-stop is mostly paperwork.
It's the most commercial thing you can do for your catalogue right now.

#OneClearance #SyncLicensing #AfricanComposers #SyncMaster`, cta: 'DM us if you\'re unsure about your rights status.' },

'IG-M2-EDU-08': { body: `Your track got shortlisted.

The supervisor likes it. The picture edit is locked.

Then they ask: "Can I get stems?"

What happens in the next 2 hours determines whether you get the deal.

Here's what professional stems look like. ↓

WHAT STEMS ACTUALLY ARE:
Separate audio exports of each main element in your track.
Not a "no drums" version. Not a "no music" version.
Individual layers that can be mixed independently.

THE STANDARD STEM CATEGORIES:
→ Full mix (the complete, mastered track)
→ Drums and percussion (isolated)
→ Bass (isolated)
→ Harmony / chords (keys, guitar, pads)
→ Melody / lead (primary melodic element)
→ Atmosphere / FX (pads, risers, ambience)
→ Vocals (if applicable — main and backing separate)

THE TECHNICAL SPEC:
→ Format: 24-bit WAV, 48kHz (broadcast standard)
→ Length: same as full mix, to the exact sample
→ Peak level: –6dBFS maximum
→ Naming convention: Artist_Title_Stem-Name.wav

THE DELIVERY STANDARD:
→ Packaged in a single named folder
→ Shared via Google Drive or Dropbox (link ready to send)
→ Delivered in under 2 hours. Ideally under 30 minutes.

When a director wants to drop out percussion for a quiet scene, they need your drums stem.
When an editor needs to extend a section, they need your loops.
If you can't deliver stems cleanly and fast, another composer gets the placement.

Build your stem library as you produce.
Not after the brief arrives.

#Stems #SyncReady #AfricanComposers #SyncMaster`, cta: 'Missing stems for any pitched track? Rebuild them this week.' },

// ── STATE ──────────────────────────────────────────────────────────
let state = {};
try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { state = {}; }

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ── FILTERS ────────────────────────────────────────────────────────
let activePlatform = 'all';
let activePillar   = 'all';

function applyFilters() {
  let count = 0;
  document.querySelectorAll('.cb-card').forEach(card => {
    const plat   = card.dataset.platform;
    const pillar = card.dataset.pillar;
    const show   = (activePlatform === 'all' || plat   === activePlatform)
                && (activePillar   === 'all' || pillar === activePillar);
    card.classList.toggle('hidden', !show);
    if (show) count++;
  });
  document.getElementById('filter-count').textContent = count + ' post' + (count !== 1 ? 's' : '');
  document.getElementById('cb-empty').classList.toggle('hidden', count > 0);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.dataset.group;
    const val   = btn.dataset.filter;
    if (group === 'platform') {
      activePlatform = val;
      document.querySelectorAll('.filter-btn[data-group="platform"]').forEach(b => b.classList.remove('active'));
    } else {
      activePillar = activePillar === val ? 'all' : val;
      document.querySelectorAll('.filter-btn[data-group="pillar"]').forEach(b => b.classList.remove('active'));
      if (activePillar === 'all') {
        document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
      }
    }
    btn.classList.toggle('active', group === 'platform' ? val === activePlatform : activePillar === val);
    if (group === 'platform') btn.classList.add('active');
    applyFilters();
  });
});

// ── PROGRESS ──────────────────────────────────────────────────────
function updateProgress() {
  const total  = POSTS.length;
  const done   = POSTS.filter(p => state[p.id] === 'done').length;
  const pct    = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-done').textContent = done;
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ── RENDER ────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '';
  const [, m, day] = d.split('-');
  const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[+m] + ' ' + (+day);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const list = document.getElementById('cb-list');

POSTS.forEach(post => {
  const copy   = COPY[post.id];
  if (!copy) return;
  const status = state[post.id] || 'todo';
  const pBadge = PLATFORM_BADGE[post.platform] || 'badge-blog';
  const pClass = PILLAR_CLASS[post.pillar]      || 'pillar-education';
  const statusLabel = status === 'todo' ? 'To Do' : status === 'inprogress' ? 'In Progress' : 'Done';

  const card = document.createElement('div');
  card.className = 'cb-card';
  card.dataset.postId  = post.id;
  card.dataset.status  = status;
  card.dataset.platform = post.platform;
  card.dataset.pillar   = post.pillar;

  card.innerHTML =
    `<div class="cb-card-hdr">` +
      `<div class="cb-card-badges">` +
        `<span class="post-id">${esc(post.id)}</span>` +
        `<span class="platform-badge ${pBadge}">${esc(post.platform)}</span>` +
        `<span class="pillar-chip ${pClass}">${esc(post.pillar)}</span>` +
        `<span class="type-tag">${esc(post.type)}</span>` +
      `</div>` +
      `<span class="cb-card-date">${fmtDate(post.date)}</span>` +
    `</div>` +
    `<div class="cb-topic">${esc(post.topic)}</div>` +
    `<div class="cb-card-copy">${esc(copy.body)}</div>` +
    (copy.cta ? `<div class="cb-card-cta">↳ ${esc(copy.cta)}</div>` : '') +
    `<div class="cb-card-ftr">` +
      `<div class="cb-status-row">` +
        `<div class="cb-status-dot" data-status="${status}"></div>` +
        `<select class="cb-status-select" data-status="${status}" data-post-id="${esc(post.id)}">` +
          `<option value="todo"${status==='todo'?' selected':''}>○ To Do</option>` +
          `<option value="inprogress"${status==='inprogress'?' selected':''}>◐ In Progress</option>` +
          `<option value="done"${status==='done'?' selected':''}>● Done</option>` +
        `</select>` +
      `</div>` +
      `<button class="cb-copy-btn" data-post-id="${esc(post.id)}" type="button">Copy</button>` +
    `</div>`;

  list.appendChild(card);
});

// ── STATUS CHANGE ────────────────────────────────────────────────
list.addEventListener('change', e => {
  const sel = e.target.closest('.cb-status-select');
  if (!sel) return;
  const id  = sel.dataset.postId;
  const val = sel.value;
  state[id] = val;
  saveState();
  sel.dataset.status = val;
  const card = sel.closest('.cb-card');
  card.dataset.status = val;
  const dot = card.querySelector('.cb-status-dot');
  if (dot) dot.dataset.status = val;
  updateProgress();
});

// ── COPY BUTTON ──────────────────────────────────────────────────
list.addEventListener('click', e => {
  const btn = e.target.closest('.cb-copy-btn');
  if (!btn) return;
  const c = COPY[btn.dataset.postId];
  if (!c) return;
  const text = c.cta ? `${c.body}\n\n${c.cta}` : c.body;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
});

updateProgress();
applyFilters();
</script>
</body>
</html>

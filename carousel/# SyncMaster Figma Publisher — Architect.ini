## Key Files

| File | Role |
|---|---|
| `carousel/batch_run.py` | CLI entry — generate copy for all 122 posts, filter by month/type/platform/ID |
| `carousel/figma_publisher.py` | Builds publish plan + execution layer for Figma |
| `carousel/exports/manifest.json` | Master index of all posts — ID, date, type, platform, pillar, month |
| `carousel/metrics.json` | Single source of truth for live stats per month |
| `carousel/product_fixtures.json` | Realistic brief card / dashboard / checklist fixture data for BTS slides |
| `carousel/screenshot_runner.py` | Playwright screenshot tool — live site or HTML template renders |


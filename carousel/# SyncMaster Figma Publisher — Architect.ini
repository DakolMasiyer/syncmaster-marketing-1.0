  "pillar": "Behind the Scenes",
  "slide_count": 10,
  "hashtags": ["#SyncMaster", "#AfricanComposers"],
  "caption_hook": "20 applications. 6 vetted. ↓",
  "caption_full": "...",
  "slides": [
    {
      "slide": 1,
      "role": "hook",
      "eyebrow": "Behind the Scenes · How vetting works",
      "headline": "20 applications. 6 vetted.",
      "lede": "We turned down 14 genuinely talented composers. ↓",
      "footer_kicker": "Behind the Scenes",
      "footer_name": "syncmaster.live",
      "footer_pageno": "01 / 10"
    },
    {
      "slide": 10,
      "role": "cta",
      "headline": "Open briefs. Every Tuesday.",
      "cta_text": "syncmaster.live",
      "footer_pageno": "END · 10 / 10"
    }
  ],
  "product_data": {
    "screen_type": "checklist",
    "checklist_items": ["Original compositions only", "..."],
    "requires_screenshot": false
  }
}

Slide roles: hook | body | stat | proof | list | showcase | cta

---
Slide Dimensions

- Canvas: 2160 × 2700 px per slide (4:5 portrait at 2x)
- Slides laid out horizontally: x = slide_index × 2160, y = 0
- Safe zones: 79px from edges (pills), 91px wordmark top, 150px stage top/bottom
- Content padding-x: 95px


## Figma Template Structure

Two base templates in `SyncMaster-Design-System---Brand-Guidelines`:

| Template | Node ID | Theme | Used for |
|---|---|---|---|
| Dark (Overlay AL) | `53:2` | `#0A0A20` bg, lime accent | Odd-position posts + all BTS |
| Light (Editorial) | `144:63` | White bg, large type | Even-position posts |

Five section frames per template (cloned per slide):

| Section | Dark node | Light node | Role in copy.json |
|---|---|---|---|
| HOOK | `52:870` | `144:71` | `hook` |
| CONTEXT | `52:973` | `144:98` | `body`, `list`, `context` |
| SHOWCASE A | `52:1073` | `144:126` | `showcase` |
| SHOWCASE B / PROOF | `52:1270` | `144:155` | `proof`, `stat` |
| CTA | `52:1490` | `144:198` | `cta` (always last slide) |

Semantic layer names — renamed directly in Figma, matched by name after cloning:

| Layer name | Content |
|---|---|
| `headline` | Main large text |
| `eyebrow` | Small label above headline |
| `body` | Supporting paragraph |
| `counter` | `01 / 10`, `END · 10 / 10` |
| `footer_label` | Bottom-left category label |
| `footer_sublabel` | Bottom-left secondary label |
| `footer_domain` | `syncmaster.live` (footer) |
| `cta_text` | CTA pill button text (CTA slide only) |
| `top_chrome` | Top navigation bar text |
| `stat_number` | Large typographic number (light template — sequential/stat slides only) |
| `type_overlay` | 2200px ghost number (light template — blanked for non-sequential posts) |
| `stat_placed_value` / `stat_roster_value` / `stat_turnaround_value` | Proof grid values (light slide 4 only) |

---

## Template Assignment Logic

Instagram posts sorted by date:

for each post:
  if pillar == "Behind the Scenes" or ID starts with IG-BTS*:
    template = dark     ← hard lock, does not advance toggle
  else:
    template = dark if toggle is even, light if toggle is odd
    toggle++

Result: Feed alternates dark/light. BTS posts always dark without disrupting the rhythm of surrounding posts.

---

## Publish Execution (per post)

1. build_publish_plan(month, post_id)
   reads manifest.json + copy.json
   assigns template (dark/light)
   maps each slide role → section template ID
   builds text_ops[] per slide: [{find_by_name, set_text}]
   computes counter strings (01/10 … END · 10/10)
   flags screenshot_op if product_data present
2. add_page("Published · Week N · Mon D–D")   ← one page per week
3. navigate_to_page(page_id)
4. For each slide (all in parallel):
   clone_node(section_template_id, parentId=page_id, x=slide_index × 2160, y=0)
 → returns clone_id
5. For each clone (all in parallel):
   scan_text_nodes(clone_id)
 → returns [{id, name, characters}] with new clone-specific IDs
6. For each text_op (all in parallel):
   find node where name == op.find_by_name
   set_text(node_id, op.set_text)

All clone and set_text calls are parallelised — all slides cloned in one batch, all text populated in one batch.

---

## Screenshot Integration (per slide, where needed)

`product_data.screen_type` in `copy.json` determines the method:

| `screen_type` | Method | Requires |
|---|---|---|
| `screenshot` | Playwright → `localhost:3000/{route}` | Syncmaster-Live running |
| `brief_card` | Render `product_fixtures.json` → HTML template → Playwright screenshot | Offline |
| `stats_dashboard` | Render `metrics.json` → dashboard HTML → Playwright screenshot | Offline |
| `checklist` | Render `checklist_items[]` → HTML template → Playwright screenshot | Offline |
| `null` | Solid brand colour fill (`#5252E0` or `#0A0A20`) — no image | Nothing |

Generated PNG → `import_image` via MCP → set as fill on mockup layer in cloned frame.


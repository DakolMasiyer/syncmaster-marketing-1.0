# SyncMaster Figma Publisher — Architecture

## Overview

A pipeline that reads structured copy files generated from the content calendar and publishes them directly into Figma as populated carousel slides, using the live design system templates.

---

## Data Flow

syncmaster-content-calendar.html
        ↓
  calendar_connector.py       ← parses all 122 posts (ID, date, type, pillar, platform)
        ↓
  copy-bank-m{1,2,3}.html
        ↓
  copy_extractor.py           ← extracts body, hook, cta per post ID
        ↓
  generators/
    carousel_copy.py          ← → copy.json  (slide-by-slide, ≤10 slides)
    single_copy.py            ← → copy.json  (single image fields)
    text_copy.py              ← → copy.md    (articles, blogs, videos)
    thread_copy.py            ← → copy.md    (tweets, threads)
        ↓
  exports/
    month-{1,2,3}/
      carousels/{ID}/copy.json
      singles/{ID}/copy.json
      tweets/{ID}/copy.md
      articles/{ID}/copy.md
      blogs/{ID}/copy.md
      videos/{ID}/copy.md
  manifest.json               ← index of all 122 posts with metadata
        ↓
  figma_publisher.py          ← builds publish plan + drives Figma via MCP
        ↓
  Figma (live, via figma-mcp-go MCP server)

